<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desk2Dine - Faculty Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Okra:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Okra', sans-serif;
            background-color: #ffffff;
            color: #1f1f1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .global-nav {
            background-color: #ffffff;
            padding: 12px 0;
            border-bottom: 1px solid #edf1f7;
        }
        .global-nav .navbar-brand {
            color: #000000 !important;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
        }
        .global-nav .navbar-brand span {
            color: #fcae1a;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            background-color: #fcfbfa;
        }

        .login-card {
            background-color: #ffffff;
            border: 1px solid #e8e8e8;
            border-radius: 16px !important;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.03);
        }

        .portal-title {
            font-weight: 800;
            color: #000000;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .form-label {
            font-weight: 600;
            color: #1f1f1f;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .form-control {
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            color: #1f1f1f;
        }
        .form-control:focus {
            border-color: #0c831f;
            box-shadow: none;
        }

        .btn-submit-solid {
            background-color: #0c831f;
            color: #ffffff !important;
            font-weight: 700;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            font-size: 1rem;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(12, 131, 31, 0.15);
        }
        .btn-submit-solid:hover {
            background-color: #0b721b;
        }

        .link-action {
            color: #0c831f;
            text-decoration: none;
            font-weight: 600;
        }
        .link-action:hover {
            color: #0b721b;
            text-decoration: underline;
        }

        .global-footer {
            background-color: #ffffff;
            color: #666666;
            padding: 24px 0;
            font-size: 0.9rem;
            border-top: 1px solid #edf1f7;
        }
    </style>
</head>
<body>

    <nav class="navbar global-nav">
        <div class="container">
            <a class="navbar-brand" href="/">Desk<span>2</span>Dine</a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="container d-flex flex-column align-items-center">
            
            <div class="login-card">
                <div class="text-center mb-4">
                    <h3 class="portal-title">Create Account</h3>
                    <span class="text-muted small">Join the official Desk2Dine platform</span>
                </div>

                <div th:if="${signupError != null}" class="alert alert-danger border-0 rounded-3 text-center small fw-semibold py-2 mb-3" th:text="${signupError}"></div>
                <div th:if="${signupSuccess != null}" class="alert alert-success border-0 rounded-3 text-center small fw-semibold py-2 mb-3" th:text="${signupSuccess}"></div>

                <form th:action="@{/auth/signup}" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter your Name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">College Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your valid email" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit-solid w-100">Register Account</button>
                </form>
            </div>

            <div class="text-center mt-3">
                <span class="text-muted small">Already have an account? </span>
                <a href="/login" class="link-action small">Sign In here</a>
            </div>

        </div>
    </div>

    <footer class="global-footer text-center">
        <div class="container">
            <span>© 2026 Desk2Dine Campus Canteen Portal. All rights reserved.</span>
        </div>
    </footer>

</body>
</html>
