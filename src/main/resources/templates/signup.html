<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Desk2Dine - Faculty Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="card border-0 shadow-lg rounded-4 p-4" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Create Faculty Account</h3>
                <p class="text-muted small">Join the official Desk2Dine platform</p>
            </div>

            <!-- Error Notifications -->
            <div th:if="${signupError != null}" class="alert alert-danger border-0 rounded-3 text-center small fw-semibold" th:text="${signupError}">Error</div>
            <div th:if="${signupSuccess != null}" class="alert alert-success border-0 rounded-3 text-center small fw-semibold" th:text="${signupSuccess}">Success</div>

            <form th:action="@{/auth/signup}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control rounded-3" placeholder="e.g. Dr. Amit Sharma" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">College Email (@mitmeerut.ac.in)</label>
                    <input type="email" name="email" class="form-control rounded-3" placeholder="name@mitmeerut.ac.in" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Password</label>
                    <input type="password" name="password" class="form-control rounded-3" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-3 fw-bold py-2 shadow-sm">Register Account</button>
            </form>

            <div class="text-center mt-4">
                <span class="text-muted small">Already have an account? </span>
                <a href="/login" class="text-decoration-none small fw-bold">Sign In here</a>
            </div>
        </div>
    </div>
</body>
</html>
