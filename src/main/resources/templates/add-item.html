<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Desk2Dine - Add New Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card border-0 shadow-sm rounded-4 p-4 bg-white">
            <h4 class="fw-bold mb-4 text-dark">Add New Canteen Item</h4>
            
            <!-- Item Form Binding Matrix -->
            <form th:action="@{/canteen/item/save}" th:object="${item}" method="POST">
                
                <!-- Item Name Input -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted">Item Name</label>
                    <input type="text" th:field="*{name}" class="form-control rounded-3" placeholder="e.g. Pizza" required>
                </div>
                
                <!-- Price Input -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted">Price (₹)</label>
                    <input type="number" step="0.1" th:field="*{price}" class="form-control rounded-3" placeholder="110.0" required>
                </div>
                
                <!-- Availability Status Checkbox -->
                <div class="mb-4 form-check">
                    <input type="checkbox" th:field="*{available}" class="form-check-input" id="avail">
                    <label class="form-check-label fw-semibold text-muted" for="avail">Available for Ordering</label>
                </div>
                
                <!-- Operation Triggers -->
                <div class="d-flex align-items-center">
                    <button type="submit" class="btn btn-primary px-4 rounded-3 fw-bold shadow-sm">Add Item</button>
                    <a href="/canteen/manage-items" class="btn btn-link text-muted text-decoration-none ms-3">Cancel</a>
                </div>
                
            </form>
        </div>
    </div>

</body>
</html>
