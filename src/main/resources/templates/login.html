<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Desk2Dine - Login Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container" style="max-width: 450px;">
        <div class="card border-0 shadow-lg rounded-4 p-4 bg-white">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Desk2Dine Portal</h3>
                <small class="text-muted">MIT Meerut Food Logistics Interface</small>
            </div>

            <!-- Login Error Notifications -->
            <div th:if="${loginError != null}" class="alert alert-danger border-0 rounded-3 text-center small fw-semibold py-2" th:text="${loginError}"></div>

            <form th:action="@{/auth/login}" method="POST">
                
                <!-- Role Dropdown Matrix Selection -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted">Select Portal Role</label>
                    <select name="role" class="form-select rounded-3" required>
                        <option value="FACULTY">Faculty Portal (@mitmeerut.ac.in)</option>
                        <option value="CANTEEN">Canteen Management Dashboard</option>
                    </select>
                </div>

                <!-- Email Form Field -->
                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted">Email Address</label>
                    <input type="email" name="email" class="form-control rounded-3" placeholder="user@mitmeerut.ac.in" required>
                </div>

                <!-- Password Form Field -->
                <div class="mb-4">
                    <label class="form-label fw-semibold text-muted">Password</label>
                    <input type="password" name="password" class="form-control rounded-3" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold shadow-sm">Sign In</button>
            </form>
        </div>
    </div>

</body>
</html>
