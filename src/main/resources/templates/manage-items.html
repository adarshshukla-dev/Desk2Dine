<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Manage Canteen Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="#">Desk2Dine</a><span class="text-white ms-auto fw-semibold">Canteen Portal</span></div>
    </nav>
    <div class="container mb-5" style="max-width: 950px;">
        <ul class="nav nav-pills mb-4 bg-white p-2 rounded shadow-sm">
            <li class="nav-item"><a class="nav-link" href="/canteen/dashboard">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="/canteen/all-orders">All Orders</a></li>
            <li class="nav-item"><a class="nav-link" href="/canteen/pending-orders">Pending Orders</a></li>
            <li class="nav-item"><a class="nav-link active" href="/canteen/manage-items">Manage Items</a></li>
        </ul>

        <!-- Sir Ke Jaisa Error Notification Alert Banner -->
        <div th:if="${errorMessage != null}" class="alert alert-danger border-0 rounded-3 text-center fw-semibold mb-3" th:text="${errorMessage}">
            Item can not be deleted.
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <a href="/canteen/add-item" class="btn btn-primary fw-bold rounded-3 px-3 shadow-sm">+ Add New Item</a>
                <form th:action="@{/canteen/manage-items}" method="GET" class="d-flex gap-2">
                    <input type="text" name="search" th:value="${searchQuery}" class="form-control rounded-3" placeholder="Search item..." style="width: 250px;">
                    <button type="submit" class="btn btn-light border rounded-3 px-3">Search</button>
                </form>
            </div>

            <table class="table align-middle">
                <thead class="table-primary text-white">
                    <tr><th>ID</th><th>Item Name</th><th>Price (₹)</th><th>Status</th><th>Actions</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${items}">
                        <td class="fw-bold" th:text="${i.id}">1</td>
                        <td th:text="${i.name}">Tea</td>
                        <td th:text="${i.price}">10.0</td>
                        <td>
                            <span class="badge px-3 py-2 rounded-pill shadow-sm" th:classappend="${i.available ? 'bg-success' : 'bg-danger'}" th:text="${i.available ? 'Available' : 'Not Available'}">Available</span>
                        </td>
                        <td><a th:href="@{'/canteen/edit-item/' + ${i.id}}" class="btn btn-link text-decoration-none fw-semibold">Edit</a></td>
                        <td>
                            <form th:action="@{'/canteen/item/delete/' + ${i.id}}" method="POST" style="display:inline;">
                                <button type="submit" class="btn btn-danger btn-sm rounded-3 px-3">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
