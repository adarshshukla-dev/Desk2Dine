<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Edit Item</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h4 class="fw-bold mb-4">Edit Item</h4>
            <form th:action="@{/canteen/item/update}" th:object="${item}" method="POST">
                <input type="hidden" th:field="*{id}">
                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted">Item Name</label>
                    <input type="text" th:field="*{name}" class="form-control rounded-3" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted">Price (₹)</label>
                    <input type="number" step="0.1" th:field="*{price}" class="form-control rounded-3" required>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" th:field="*{available}" class="form-check-input" id="avail">
                    <label class="form-check-label fw-semibold text-muted" for="avail">Available</label>
                </div>
                <button type="submit" class="btn btn-primary px-4 rounded-3 fw-bold">Update Item</button>
                <a href="/canteen/manage-items" class="btn btn-link text-muted text-decoration-none ms-3">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
