<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Faculty Suite - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
    <div class="container" style="max-width: 450px;">
        <div class="card border-0 shadow-sm rounded-4 p-4 bg-white">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-primary">Faculty Portal</h3>
                <p class="text-muted small">Sign in using your college institutional identity credentials</p>
            </div>
            
            <div th:if="${param.error}" class="alert alert-danger border-0 text-center rounded-3 py-2 small">
                Invalid Institutional Email or Password Combination!
            </div>

            <form th:action="@{/faculty/login/process}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-semibold">Campus Email Address</label>
                    <input type="email" name="email" class="form-control rounded-3" placeholder="username@mit.edu" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-semibold">Account Access Password</label>
                    <input type="password" name="password" class="form-control rounded-3" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-semibold shadow-sm fs-6">Authenticate & Enter</button>
            </form>
            <div class="text-center mt-3"><a href="/" class="text-muted small text-decoration-none">← Back to Main Gateway</a></div>
        </div>
    </div>
</body>
</html>
