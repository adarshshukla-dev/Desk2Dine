<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Pending Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container"><a class="navbar-brand fw-bold" href="#">Desk2Dine</a><span class="text-white ms-auto fw-semibold">Canteen Portal</span></div>
    </nav>
    <div class="container mb-5" style="max-width: 950px;">
        <ul class="nav nav-pills mb-4 bg-white p-2 rounded shadow-sm">
    <li class="nav-item"><a class="nav-link active" href="/canteen/dashboard">Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/canteen/all-orders">All Orders</a></li>
    <li class="nav-item"><a class="nav-link" href="/canteen/pending-orders">Pending Orders</a></li>
    <li class="nav-item"><a class="nav-link" href="/canteen/manage-items">Manage Items</a></li>
        </ul>
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h4 class="fw-bold mb-4">Pending Orders</h4>
            <table class="table align-middle">
                <thead class="table-warning text-dark">
                    <tr><th>Order ID</th><th>Order Time</th><th>Faculty Member</th><th>Delivery Location</th><th>Cost</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody>
                    <tr th:each="o : ${orders}">
                        <td class="fw-bold" th:text="${o.id}">20</td>
                        <td th:text="${o.orderTime}">Time</td>
                        <td th:text="${o.facultyName}">Name</td>
                        <td th:text="${o.deliveryLocation}">F-404</td>
                        <td th:text="'₹ ' + ${o.totalAmount}">70.0</td>
                        <td><span class="badge bg-primary px-3 py-2 rounded-pill" th:text="${o.status}">PLACED</span></td>
                        <td><a th:href="@{'/canteen/order-details/' + ${o.id}}" class="btn btn-primary btn-sm rounded-3">View Details</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
